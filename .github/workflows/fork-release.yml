name: fork-release
on:
  push:
    branches:
      - stable
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  compute-release:
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.compute.outputs.base_version }}
      fork_counter: ${{ steps.compute.outputs.fork_counter }}
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
      tag_exists: ${{ steps.compute.outputs.tag_exists }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: "[5%] Fetch tags"
        run: git fetch --tags --force

      - name: "[10%] Compute next fork release version"
        id: compute
        run: |
          python3 scripts/compute_fork_release.py --write-github-output

  build:
    needs: compute-release
    name: Build - ${{ matrix.target }}
    runs-on: macos-15
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    defaults:
      run:
        working-directory: codex-rs
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin

    steps:
      - name: "[20%] Check out release source"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: "[25%] Compute Cargo cache key"
        id: cargo-cache-key
        shell: bash
        run: |
          set -euo pipefail
          echo "lock_hash=$(shasum -a 256 Cargo.lock rust-toolchain.toml | shasum -a 256 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: "[28%] Restore Cargo dependency cache"
        id: cargo-cache-restore
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
          key: fork-release-cargo-${{ runner.os }}-${{ matrix.target }}-${{ steps.cargo-cache-key.outputs.lock_hash }}
          restore-keys: |
            fork-release-cargo-${{ runner.os }}-${{ matrix.target }}-

      - name: "[30%] Install Rust toolchain"
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}

      - name: "[35%] Prefetch Cargo dependencies"
        shell: bash
        env:
          TARGET_TRIPLE: ${{ matrix.target }}
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "::notice::[35%] cargo fetch attempt ${attempt}/3 for ${TARGET_TRIPLE}"
            if cargo fetch --locked --target "${TARGET_TRIPLE}" -vv; then
              echo "::notice::[35%] cargo fetch succeeded on attempt ${attempt}/3"
              exit 0
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "::error::[35%] cargo fetch failed after ${attempt} attempts"
              exit 1
            fi
            sleep_seconds=$((attempt * 15))
            echo "::warning::[35%] cargo fetch failed on attempt ${attempt}/3; retrying in ${sleep_seconds}s"
            sleep "${sleep_seconds}"
          done

      - name: "[38%] Save Cargo dependency cache"
        if: ${{ steps.cargo-cache-restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
          key: fork-release-cargo-${{ runner.os }}-${{ matrix.target }}-${{ steps.cargo-cache-key.outputs.lock_hash }}

      - name: "[40-60%] Build release binary"
        shell: bash
        env:
          CODEX_SOURCE_BASE_VERSION: ${{ needs.compute-release.outputs.base_version }}
          CODEX_SOURCE_VERSION_SUFFIX: rick.${{ needs.compute-release.outputs.fork_counter }}
          HEARTBEAT_INTERVAL_SEC: 60
          TARGET_TRIPLE: ${{ matrix.target }}
        run: |
          set -euo pipefail

          log_progress() {
            local message="$1"
            echo "::notice::${message}"
          }

          append_summary() {
            local line="$1"
            [[ -n "${GITHUB_STEP_SUMMARY:-}" ]] || return 0
            printf '%s\n' "${line}" >> "${GITHUB_STEP_SUMMARY}"
          }

          latest_target_snapshot() {
            local release_dir="target/${TARGET_TRIPLE}/release"
            local file_count latest_file latest_size latest_mtime now age_sec

            if [[ ! -d "${release_dir}" ]]; then
              echo "release_dir=missing"
              return 0
            fi

            file_count="$(find "${release_dir}" -type f | wc -l | tr -d ' ')"
            if [[ "${file_count}" == "0" ]]; then
              echo "release_dir=${release_dir} files=0"
              return 0
            fi

            latest_file="$(find "${release_dir}" -type f -print0 | xargs -0 ls -t 2>/dev/null | head -n 1 || true)"
            if [[ -z "${latest_file}" ]]; then
              echo "release_dir=${release_dir} files=${file_count} newest=unavailable"
              return 0
            fi

            latest_size="$(stat -f '%z' "${latest_file}")"
            latest_mtime="$(stat -f '%m' "${latest_file}")"
            now="$(date +%s)"
            age_sec="$((now - latest_mtime))"
            echo "release_dir=${release_dir} files=${file_count} newest=${latest_file#${release_dir}/} size_bytes=${latest_size} age_sec=${age_sec}"
          }

          append_summary "### fork-release progress"
          append_summary "- [40%] Starting cargo build for ${TARGET_TRIPLE}"
          log_progress "[40%] Starting cargo build for ${TARGET_TRIPLE}"

          cargo build --target "${TARGET_TRIPLE}" --release --bin codex -vv &
          build_pid=$!
          started_at="$(date +%s)"

          while kill -0 "${build_pid}" 2>/dev/null; do
            sleep "${HEARTBEAT_INTERVAL_SEC}"
            if ! kill -0 "${build_pid}" 2>/dev/null; then
              break
            fi

            now="$(date +%s)"
            elapsed_sec="$((now - started_at))"
            elapsed_min="$((elapsed_sec / 60))"

            log_progress "[50%] Cargo build still running for ${elapsed_min}m (${elapsed_sec}s)"
            echo "[proof-of-life] $(date -u '+%Y-%m-%dT%H:%M:%SZ') elapsed=${elapsed_sec}s target=${TARGET_TRIPLE}"
            echo "[proof-of-life] active cargo/rustc processes"
            ps -Ao pid,ppid,%cpu,etime,time,command | grep -E '[r]ustc|[c]argo' || true
            echo "[proof-of-life] target snapshot"
            latest_target_snapshot || true
            echo "[proof-of-life] target disk usage"
            du -sh "target/${TARGET_TRIPLE}" 2>/dev/null || true
          done

          wait "${build_pid}"

          finished_at="$(date +%s)"
          duration_sec="$((finished_at - started_at))"
          duration_min="$((duration_sec / 60))"
          log_progress "[60%] Cargo build completed in ${duration_min}m (${duration_sec}s)"
          append_summary "- [60%] Cargo build completed in ${duration_min}m (${duration_sec}s)"

      - name: "[65%] Stage artifacts"
        shell: bash
        run: |
          set -euo pipefail
          dest="../dist/${{ matrix.target }}"
          mkdir -p "${dest}"
          cp "target/${{ matrix.target }}/release/codex" "${dest}/codex-${{ matrix.target }}"
          tar -C "${dest}" -czf "${dest}/codex-${{ matrix.target }}.tar.gz" "codex-${{ matrix.target }}"
          zstd -T0 -19 --rm "${dest}/codex-${{ matrix.target }}"

      - name: "[70%] Upload build artifacts"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.target }}/*

  release:
    needs:
      - compute-release
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ needs.compute-release.outputs.version }}
      tag: ${{ needs.compute-release.outputs.tag }}

    steps:
      - name: "[75%] Check out release metadata"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: "[78%] Fetch tags"
        run: git fetch --tags --force

      - name: "[80%] Download build artifacts"
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: "[84%] Create release tag"
        if: ${{ needs.compute-release.outputs.tag_exists != 'true' }}
        env:
          RELEASE_TAG: ${{ needs.compute-release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.compute-release.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_VERSION"
          git push origin "$RELEASE_TAG"

      - name: "[87%] Setup Node.js"
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      # stage_npm_packages.py shells out to DotSlash when vendoring ripgrep.
      - name: "[88%] Install DotSlash"
        uses: facebook/install-dotslash@1e4e7b3e07eaca387acb98f1d4720e0bee8dbb6a # v2

      - name: "[90%] Stage npm packages"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.compute-release.outputs.version }}
          WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          ./scripts/stage_npm_packages.py \
            --release-version "$RELEASE_VERSION" \
            --package codex \
            --workflow-url "$WORKFLOW_URL" \
            --release-config .github/fork-release-config.json

      - name: "[93%] Upload npm tarballs"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: fork-npm-tarballs
          path: dist/npm/*

      - name: "[96%] Create GitHub Release"
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          name: ${{ needs.compute-release.outputs.version }}
          tag_name: ${{ needs.compute-release.outputs.tag }}
          files: |
            dist/**/*.tgz
            dist/**/*.tar.gz
            dist/**/*.zst

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: "[98%] Setup Node.js for npm publish"
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          scope: "@rickgetz"

      - name: "[99%] Download npm tarballs"
        uses: actions/download-artifact@v4
        with:
          name: fork-npm-tarballs
          path: dist/npm

      - name: "[99.5%] Audit npm tarballs"
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          tarballs=(dist/npm/*.tgz)
          if [[ ${#tarballs[@]} -eq 0 ]]; then
            echo "No npm tarballs found to audit"
            exit 1
          fi

          blocked_entry_regex='(^|/)(\.npmrc|\.env(\..*)?|id_(rsa|dsa|ecdsa|ed25519)|.*\.(pem|key|p12|pfx)|\.aws/|\.ssh/)'

          for tarball in "${tarballs[@]}"; do
            filename="$(basename "${tarball}")"
            echo "Auditing ${filename}"

            if tar -tzf "${tarball}" | grep -E "${blocked_entry_regex}" > /tmp/fork-release-blocked-entries.txt; then
              echo "::error::Tarball ${filename} contains blocked secret-like paths"
              cat /tmp/fork-release-blocked-entries.txt
              exit 1
            fi
          done

      - name: "[100%] Publish to npm"
        env:
          VERSION: ${{ needs.release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          sanitize_publish_output() {
            python3 -c 'import re, sys; text = sys.stdin.read(); text = re.sub(r"(_authToken=)[^\\s&\\\"]+", r"\\1***REDACTED***", text); text = re.sub(r"(Bearer\\s+)[A-Za-z0-9._~-]+", r"\\1***REDACTED***", text); print(text, end="")'
          }

          tarballs=(dist/npm/*-"${VERSION}".tgz)
          if [[ ${#tarballs[@]} -eq 0 ]]; then
            echo "No npm tarballs found for ${VERSION}"
            exit 1
          fi

          for tarball in "${tarballs[@]}"; do
            filename="$(basename "${tarball}")"
            publish_cmd=(npm publish "${GITHUB_WORKSPACE}/${tarball}" --access public)

            case "${filename}" in
              codex-npm-"${VERSION}".tgz)
                publish_cmd+=(--tag latest)
                ;;
              codex-npm-darwin-arm64-"${VERSION}".tgz)
                publish_cmd+=(--tag darwin-arm64)
                ;;
            esac

            echo "+ ${publish_cmd[*]}"
            set +e
            publish_output="$("${publish_cmd[@]}" 2>&1)"
            publish_status=$?
            set -e

            printf '%s' "${publish_output}" | sanitize_publish_output
            if [[ ${publish_status} -eq 0 ]]; then
              continue
            fi

            if grep -qiE "previously published|cannot publish over|version already exists" <<< "${publish_output}"; then
              echo "Skipping already-published package version for ${filename}"
              continue
            fi

            exit "${publish_status}"
          done
